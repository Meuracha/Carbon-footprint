carbon_footprint:
  target: dev
  outputs:

    # ─── Local development (docker compose) ──────────────────
    dev:
      type: postgres
      host: "{{ env_var('CARBON_DB_HOST', 'localhost') }}"
      port: "{{ env_var('CARBON_DB_PORT', '5433') | int }}"
      dbname: "{{ env_var('CARBON_DB_NAME') }}"
      user: "{{ env_var('CARBON_DB_USER') }}"
      password: "{{ env_var('CARBON_DB_PASS') }}"
      schema: public
      threads: 4
      connect_timeout: 10

    # ─── Inside Airflow container ─────────────────────────────
    airflow:
      type: postgres
      host: "{{ env_var('CARBON_DB_HOST', 'postgres-carbon') }}"
      port: 5432
      dbname: "{{ env_var('CARBON_DB_NAME') }}"
      user: "{{ env_var('CARBON_DB_USER') }}"
      password: "{{ env_var('CARBON_DB_PASS') }}"
      schema: public
      threads: 4